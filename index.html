<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manny Tech | Innovating the Future</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0B0E14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            scroll-behavior: smooth;
        }

        .landing-container {
            padding: 2rem;
            max-width: 1200px;
        }

        h1 {
            font-size: 8rem; /* Huge heading for desktop */
            margin: 0;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 13px;
            animation: fadeIn 2s ease-in-out;
        }

        p {
            font-size: 1.6rem;
            color: #a0a0a0;
            margin-top: 1rem;
            letter-spacing: 2px;
        }

        .cta-button {
            margin-top: 2rem;
            padding: 1.2rem 3.5rem;
            font-size: 1.2rem;
            color: #fff;
            background: transparent;
            border: 2px solid #00d2ff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .cta-button:hover,
        .cta-button:focus {
            background: #00d2ff;
            box-shadow: 0 0 25px #00d2ff;
            color: #0b0e14;
            outline: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Text */
        @media (max-width: 1024px) {
            h1 {
                font-size: 6rem;
                letter-spacing: 6px;
            }
            p {
                font-size: 1.4rem;
            }
            .cta-button {
                padding: 1rem 3rem;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 4.5rem;
                letter-spacing: 4px;
            }
            p {
                font-size: 1.2rem;
            }
            .cta-button {
                padding: 0.9rem 2.5rem;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 3rem;
                letter-spacing: 2px;
            }
            p {
                font-size: 1rem;
            }
            .cta-button {
                padding: 0.8rem 2rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <main class="landing-container">
        <h1>MANNy TECH</h1>
        <p>Leading the next generation of digital solutions.</p>
        <a href="portfolio.html" class="cta-button" aria-label="Explore our technology portfolio">Explore Our Tech</a>
    </main>

</body>
</html>
