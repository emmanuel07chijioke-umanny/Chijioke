<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manny Tech Science Quiz</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --card: #1a1f29; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-container { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 50px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--primary); font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .question { font-size: 1.3rem; margin-bottom: 20px; min-height: 60px; line-height: 1.5; }
        .options-grid { display: grid; gap: 12px; }
        button.option { background: #252d3d; border: 1px solid #3a4454; color: white; padding: 15px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; font-size: 1rem; }
        button.option:hover { border-color: var(--primary); }
        .score-screen { text-align: center; display: none; }
        .btn-next { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 100%; }
        .btn-restart { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        

    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="header">
        <span>Manny Tech Quiz | <span id="q-num">1</span>/100</span>
        <span>Score: <span id="score">0</span></span>
    </div>
    <div class="question" id="q-text">Loading question...</div>
    <div id="options" class="options-grid"></div>
    <div id="action-area"></div>
</div>

<div class="quiz-container score-screen" id="result-box">
    <h1>Quiz Completed!</h1>
    <p style="font-size: 1.5rem;">Your final score: <span id="final-score" style="color: var(--primary);">0</span> / 100</p>
    <button class="btn-restart" onclick="location.reload()">Restart Quiz</button>
</div>

<script>
    // FILL THESE WITH YOUR 100 QUESTIONS
    const questions = [
        { q: "What is the SI unit of Capacitance?", a: ["Volt", "Farad", "Ohm", "Ampere"], correct: 1 },
        { q: "Which gas do plants absorb during photosynthesis?", a: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Helium"], correct: 2 },
        { q: "What is the hardest natural substance on Earth?", a: ["Gold", "Iron", "Diamond", "Quartz"], correct: 2 },
        { q: "The power house of the cell is known as?", a: ["Nucleus", "Mitochondria", "Ribosome", "Cytoplasm"], correct: 1 },
        { q: "What is the speed of light?", a: ["300,000 km/s", "150,000 km/s", "500,000 km/s", "1,000,000 km/s"], correct: 0 }
    ];

    // This loop fills the remaining spots to reach 100 so the app doesn't break
    while(questions.length < 100) {
        questions.push({ 
            q: `General Science Question ${questions.length + 1}: What is the chemical symbol for Water?`, 
            a: ["CO2", "O2", "H2O", "NaCl"], 
            correct: 2 
        });
    }

    let currentIdx = 0;
    let score = 0;
    let canClick = true;

    function loadQuestion() {
        canClick = true;
        const qData = questions[currentIdx];
        document.getElementById("q-num").innerText = currentIdx + 1;
        document.getElementById("q-text").innerText = qData.q;
        document.getElementById("action-area").innerHTML = ""; // Clear next button
        
        const optionsEl = document.getElementById("options");
        optionsEl.innerHTML = "";
        
        qData.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option";
            btn.id = `opt-${i}`;
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        if (!canClick) return;
        canClick = false;

        const correctIdx = questions[currentIdx].correct;
        const buttons = document.querySelectorAll('.option');

        if (selected === correctIdx) {
            score++;
            document.getElementById("score").innerText = score;
            document.getElementById(`opt-${selected}`).style.background = "var(--success)";
            document.getElementById(`opt-${selected}`).style.borderColor = "var(--success)";
        } else {
            document.getElementById(`opt-${selected}`).style.background = "var(--danger)";
            document.getElementById(`opt-${selected}`).style.borderColor = "var(--danger)";
            document.getElementById(`opt-${correctIdx}`).style.background = "var(--success)";
        }

        // Show Next Button
        const nextBtn = document.createElement("button");
        nextBtn.className = "btn-next";
        nextBtn.innerText = currentIdx === 99 ? "See Final Results" : "Next Question →";
        nextBtn.onclick = nextQuestion;
        document.getElementById("action-area").appendChild(nextBtn);
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-box").style.display = "none";
        document.getElementById("result-box").style.display = "block";
        document.getElementById("final-score").innerText = score;
    }

    loadQuestion();
</script>

</body>
</html>
