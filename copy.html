<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manny Tech Science Quiz</title>
<style>
:root {
    --primary: #00d2ff;
    --bg: #0b0e14;
    --card: #1a1f29;
    --success: #28a745;
    --danger: #dc3545;
    --timer-bg: #333;
}
body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
    margin: 0;
}
.quiz-container {
    background: var(--card);
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin-top: 50px;
}
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    color: var(--primary);
    font-weight: bold;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
}
.question {
    font-size: 1.3rem;
    margin-bottom: 15px;
    min-height: 60px;
    line-height: 1.5;
}
.options-grid {
    display: grid;
    gap: 12px;
}
button.option {
    background: #252d3d;
    border: 1px solid #3a4454;
    color: white;
    padding: 15px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    transition: 0.2s;
    font-size: 1rem;
}
button.option:hover { border-color: var(--primary); }
.explanation {
    margin-top: 15px;
    background: #111622;
    padding: 10px;
    border-left: 4px solid var(--primary);
    border-radius: 5px;
    font-size: 0.95rem;
    line-height: 1.4;
    display:none;
}
.score-screen {
    text-align: center;
    display: none;
}
.btn-next, .btn-restart {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    margin-top: 20px;
    cursor: pointer;
}
.btn-next { background: var(--primary); color: #000; }
.btn-restart { background: #fff; color: #000; }
.motivation { font-size: 1.2rem; margin-top: 10px; color: var(--primary); }

#progress-container {
    width: 100%;
    background: var(--timer-bg);
    border-radius: 5px;
    margin-bottom: 15px;
}
#progress-bar {
    height: 8px;
    width: 100%;
    background: var(--primary);
    border-radius: 5px;
}
</style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="header">
        <span id="quiz-title">Manny Tech Science Quiz</span>
        <span>Score: <span id="score">0</span></span>
    </div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div class="question" id="q-text">Loading question...</div>
    <div id="options" class="options-grid"></div>
    <div id="explanation" class="explanation"></div>
    <div id="action-area"></div>
</div>

<div class="quiz-container score-screen" id="result-box">
    <h1>Quiz Completed!</h1>
    <p style="font-size: 1.5rem;">Your final score: <span id="final-score" style="color: var(--primary);">0</span></p>
    <p class="motivation" id="motivation-msg"></p>
    <button class="btn-restart" onclick="location.reload()">Restart Quiz</button>
</div>

<script>
// ========== CONFIG ==========
const quizName = "Manny Tech Science Quiz";
const questionsPerLevel = 20;
const timerSeconds = 10;
let timerInterval;

// ========== QUESTION ARRAYS ==========
// Physics (67)
const physicsQuestions = [
  { q: "What is the SI unit of Capacitance?", a: ["Volt", "Farad", "Ohm", "Ampere"], correct: 1, explanation: "Farad is the SI unit of capacitance, named after Michael Faraday." },
  { q: "Which is the hardest natural substance?", a: ["Gold", "Iron", "Diamond", "Quartz"], correct: 2, explanation: "Diamond is the hardest naturally occurring substance known." },
  { q: "The power house of the cell is known as?", a: ["Nucleus", "Mitochondria", "Ribosome", "Cytoplasm"], correct: 1, explanation: "Mitochondria produce energy for the cell." }
  // Add remaining 64 Physics questions
];

// Chemistry (67)
const chemistryQuestions = [
  { q: "What is the chemical symbol for Gold?", a: ["Go", "Gd", "Au", "Ag"], correct: 2, explanation: "Au is the chemical symbol for gold from its Latin name 'Aurum'." },
  { q: "Which gas is most abundant in the Earth's atmosphere?", a: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], correct: 1, explanation: "Nitrogen makes up about 78% of Earth's atmosphere." },
  { q: "What is the pH value of pure water?", a: ["7", "0", "14", "5"], correct: 0, explanation: "Pure water is neutral with a pH of 7." }
  // Add remaining 64 Chemistry questions
];

// Biology (67)
const biologyQuestions = [
  { q: "The basic unit of life is?", a: ["Cell", "Tissue", "Organ", "Organ system"], correct: 0, explanation: "The cell is the fundamental unit of life." },
  { q: "Which organelle is the powerhouse of the cell?", a: ["Mitochondria", "Nucleus", "Ribosome", "Golgi apparatus"], correct: 0, explanation: "Mitochondria produce energy via respiration." },
  { q: "DNA stands for?", a: ["Deoxyribonucleic acid", "Ribonucleic acid", "Dinucleic acid", "Dioxin acid"], correct: 0, explanation: "DNA carries genetic information." }
  // Add remaining 64 Biology questions
];

// Combine and shuffle 20 per level
function getShuffledLevelQuestions(array){
  const copy = [...array];
  copy.sort(() => Math.random()-0.5);
  return copy.slice(0, questionsPerLevel);
}

let allQuestions = [
  ...getShuffledLevelQuestions(physicsQuestions),
  ...getShuffledLevelQuestions(chemistryQuestions),
  ...getShuffledLevelQuestions(biologyQuestions)
];

// Shuffle combined quiz
allQuestions.sort(() => Math.random()-0.5);

// ========== QUIZ STATE ==========
let currentIdx = 0;
let score = 0;
let canClick = true;

// ========== TIMER ==========
function startTimer(){
  let timeLeft = timerSeconds;
  const progressBar = document.getElementById("progress-bar");
  progressBar.style.width = "100%";
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timeLeft--;
    progressBar.style.width = (timeLeft/timerSeconds*100)+"%";
    if(timeLeft <=0){
      clearInterval(timerInterval);
      checkAnswer(null);
    }
  },1000);
}

// ========== LOAD QUESTION ==========
function loadQuestion(){
  canClick = true;
  startTimer();
  const qData = allQuestions[currentIdx];
  document.getElementById("quiz-title").innerText = quizName + " | "+(currentIdx+1)+"/"+allQuestions.length;
  document.getElementById("q-text").innerText = qData.q;
  const explanationEl = document.getElementById("explanation");
  explanationEl.style.display="none";
  explanationEl.innerText="";
  document.getElementById("action-area").innerHTML="";

  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML="";
  qData.a.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.className="option";
    btn.id=`opt-${i}`;
    btn.innerText=opt;
    btn.onclick=()=>checkAnswer(i);
    optionsEl.appendChild(btn);
  });
}

// ========== CHECK ANSWER ==========
function checkAnswer(selected){
  if(!canClick) return;
  canClick=false;
  clearInterval(timerInterval);
  const correctIdx = allQuestions[currentIdx].correct;
  const explanationEl = document.getElementById("explanation");

  if(selected === correctIdx){
    score++;
    document.getElementById("score").innerText=score;
    if(selected!==null) document.getElementById(`opt-${selected}`).style.background="var(--success)";
    explanationEl.style.color="var(--success)";
  }else{
    if(selected!==null) document.getElementById(`opt-${selected}`).style.background="var(--danger)";
    document.getElementById(`opt-${correctIdx}`).style.background="var(--success)";
    explanationEl.style.color="var(--danger)";
  }

  explanationEl.innerText = allQuestions[currentIdx].explanation;
  explanationEl.style.display="block";

  const nextBtn=document.createElement("button");
  nextBtn.className="btn-next";
  nextBtn.innerText=currentIdx===allQuestions.length-1?"See Final Results":"Next Question →";
  nextBtn.onclick=nextQuestion;
  document.getElementById("action-area").appendChild(nextBtn);
}

// ========== NEXT QUESTION ==========
function nextQuestion(){
  currentIdx++;
  if(currentIdx<allQuestions.length){
    loadQuestion();
  }else{
    showResults();
  }
}

// ========== SHOW RESULTS ==========
function showResults(){
  document.getElementById("quiz-box").style.display="none";
  document.getElementById("result-box").style.display="block";
  document.getElementById("final-score").innerText=score;

  const motivationMsg = document.getElementById("motivation-msg");
  if(score === allQuestions.length){
    motivationMsg.innerText = "🎉 Amazing! Perfect score! Keep up the great work!";
  } else if(score >= Math.floor(allQuestions.length*0.75)){
    motivationMsg.innerText = "🌟 Great job! You're very knowledgeable!";
  } else if(score >= Math.floor(allQuestions.length*0.5)){
    motivationMsg.innerText = "👍 Good effort! Keep learning and improving!";
  } else{
    motivationMsg.innerText = "💡 Don't worry! Keep practicing and you'll get better!";
  }
}

// ========== INITIALIZE ==========
loadQuestion();
</script>

</body>
</html>
