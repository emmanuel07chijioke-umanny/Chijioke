<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manny Tech Ultimate Science Quiz</title>

<style>
:root{
    --primary:#00d2ff;
    --bg:#0b0e14;
    --card:#1a1f29;
    --success:#28a745;
    --danger:#dc3545;
}

body{
    font-family:Segoe UI;
    background:var(--bg);
    color:white;
    display:flex;
    justify-content:center;
    padding:20px;
}

.quiz-container{
    background:var(--card);
    padding:20px;
    border-radius:12px;
    width:100%;
    max-width:600px;
}

.progress-bar{
    height:8px;
    background:#333;
    margin:10px 0;
    border-radius:5px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:var(--primary);
}

.option{
    background:#252d3d;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    cursor:pointer;
}

.option:hover{
    border:1px solid var(--primary);
}

.timer{
    text-align:right;
    font-weight:bold;
}

.hidden{
    display:none;
}

button{
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div class="quiz-container" id="start-box">
<h2>Manny Tech Science Quiz</h2>
<input id="username" placeholder="Enter your name">
<button onclick="startQuiz()">Start Quiz</button>
</div>

<!-- QUIZ SCREEN -->
<div class="quiz-container hidden" id="quiz-box">
<div>
Level <span id="level">1</span> |
Score: <span id="score">0</span>
</div>

<div class="progress-bar">
<div id="progress" class="progress"></div>
</div>

<div class="timer">⏱ <span id="time">6</span>s</div>

<h3 id="q-text"></h3>
<div id="options"></div>
<div id="explanation"></div>
</div>

<!-- RESULT SCREEN -->
<div class="quiz-container hidden" id="result-box">
<h2>Quiz Finished!</h2>
<p id="final-score"></p>

<h3>Leaderboard</h3>
<ul id="leaderboard"></ul>

<button onclick="location.reload()">Restart</button>
</div>

<!-- SOUND EFFECTS -->
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

<script>

// ================= QUESTIONS =================
const allQuestions = [];

// Generate 200 questions
for(let i=1;i<=200;i++){
    allQuestions.push({
        q: `Question ${i}: What is ${i} + ${i}?`,
        a: [`${i+i}`,`${i+i+1}`,`${i+i+2}`,`${i+i+3}`],
        correct: 0,
        explanation: `${i} + ${i} = ${i+i}`
    });
}

// Shuffle
function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}
shuffle(allQuestions);

// Split into levels (20 per level)
const levels=[];
for(let i=0;i<allQuestions.length;i+=20){
    levels.push(allQuestions.slice(i,i+20));
}

// ================= VARIABLES =================
let user="";
let level=0;
let index=0;
let score=0;
let timer;
let timeLeft=6;
let canClick=true;

// ================= START QUIZ =================
function startQuiz(){
    user=document.getElementById("username").value || "Player";
    document.getElementById("start-box").classList.add("hidden");
    document.getElementById("quiz-box").classList.remove("hidden");
    loadQuestion();
}

// ================= LOAD QUESTION =================
function loadQuestion(){
    clearInterval(timer);
    canClick=true;
    timeLeft=6;
    document.getElementById("time").innerText=timeLeft;

    let q=levels[level][index];
    document.getElementById("level").innerText=level+1;
    document.getElementById("q-text").innerText=q.q;

    let optBox=document.getElementById("options");
    optBox.innerHTML="";

    q.a.forEach((opt,i)=>{
        let div=document.createElement("div");
        div.className="option";
        div.innerText=opt;
        div.onclick=()=>checkAnswer(i);
        optBox.appendChild(div);
    });

    updateProgress();
    startTimer();
}

// ================= TIMER =================
function startTimer(){
    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("time").innerText=timeLeft;

        if(timeLeft<=0){
            clearInterval(timer);
            nextQuestion();
        }
    },1000);
}

// ================= PROGRESS =================
function updateProgress(){
    let percent=((index+1)/20)*100;
    document.getElementById("progress").style.width=percent+"%";
}

// ================= CHECK ANSWER =================
function checkAnswer(selected){
    if(!canClick) return;
    canClick=false;

    clearInterval(timer);

    let q=levels[level][index];
    let options=document.querySelectorAll(".option");

    if(selected===q.correct){
        score++;
        document.getElementById("score").innerText=score;
        options[selected].style.background="green";
        document.getElementById("correctSound").play();
    }else{
        options[selected].style.background="red";
        options[q.correct].style.background="green";
        document.getElementById("wrongSound").play();
    }

    setTimeout(nextQuestion,800);
}

// ================= NEXT QUESTION =================
function nextQuestion(){
    index++;

    if(index<20){
        loadQuestion();
    }else{
        level++;
        if(level<levels.length){
            index=0;
            alert("Level Up!");
            loadQuestion();
        }else{
            showResults();
        }
    }
}

// ================= RESULTS =================
function showResults(){
    document.getElementById("quiz-box").classList.add("hidden");
    document.getElementById("result-box").classList.remove("hidden");

    document.getElementById("final-score").innerText =
        `${user}, your score: ${score}/200`;

    saveScore(user,score);
    loadLeaderboard();
}

// ================= LEADERBOARD =================
function saveScore(name,score){
    let data=JSON.parse(localStorage.getItem("quizScores")) || [];
    data.push({name,score});
    data.sort((a,b)=>b.score-a.score);
    localStorage.setItem("quizScores",JSON.stringify(data.slice(0,5)));
}

function loadLeaderboard(){
    let data=JSON.parse(localStorage.getItem("quizScores")) || [];
    let ul=document.getElementById("leaderboard");
    ul.innerHTML="";
    data.forEach(d=>{
        let li=document.createElement("li");
        li.innerText=`${d.name} - ${d.score}`;
        ul.appendChild(li);
    });
}

</script>

</body>
</html>
